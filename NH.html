<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 화면 전체를 flex 컨테이너로 설정하여 중앙 정렬 */
        body {
            margin: 0;
            padding: 0;
            /* height: 100vh; */
            /* 화면 전체 높이 사용 */
            display: flex;
            justify-content: center;
            /* 가로 중앙 정렬 */
            align-items: center;
            /* 세로 중앙 정렬 */
            background-color: rgb(248 249 251);
            /* 눈이 편안한 연한 배경색 */
        }

        /* 이미지 스타일링 */
        .centered-image {
            max-width: 90%;
        }
    </style>
</head>

<body>

    <img src="https://ruqwk99.github.io/Web-Server/test.htm/views/NH99.png" alt="" class="centered-image">

</body>

</html>
